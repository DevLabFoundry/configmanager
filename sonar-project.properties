sonar.projectKey=DevLabFoundry_configmanager
sonar.organization=devlabfoundry
# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=configmanager

sonar.sources=.
sonar.exclusions=**/*_test.go,**/*_generated*.go,**/*_generated/**,**/vendor/**,**/examples/**
sonar.inclusions=**/*.go

sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.test.exclusions=**/*_generated*.go,**/*_generated/**,**/vendor/**

sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=true

# go
sonar.go.coverage.reportPaths=.coverage/out
sonar.go.tests.reportPaths=.coverage/report-junit.xml
